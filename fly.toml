# fly.toml app configuration file generated for beast-mode on 2026-06-10T08:19:38Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# Beast Mode (production). Adapted from the stckrm deployment:
# Deno backend on :8000, Caddy front on :8080, KV on a mounted volume.

app = 'beast-mode'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'

[env]
  DENO_KV_PATH = '/data/beastmode.db'

[[mounts]]
  source = 'beastmode_data'
  destination = '/data'
  initial_size = '5gb'
  snapshot_retention = 5

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep one machine alive: the R2 snapshot cron and any presence/SSE
  # endpoints need a running instance, exactly as stckrm relies on.
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 150

[[vm]]
  # 512mb: the backend now proxies image BYTES through itself — the direct
  # Gemini (Nano Banana) adapter returns base64 image data, which is held in
  # memory and re-hosted to R2. A 4K base64 payload plus the JSON parse of
  # Google's response is several MB resident at once; 256mb OOM-killed the
  # process (Exit 137) mid-request, surfacing to the client as a 502.
  size = 'shared-cpu-1x'
  memory = '512mb'
